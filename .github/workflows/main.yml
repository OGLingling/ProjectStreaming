name: Deploy Flutter Web
on:
  push:
    branches:
      - main # Si tu rama es 'master', cambia 'main' por 'master'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build Web
        # Entramos a la carpeta frontend para compilar
        run: flutter build web --base-href "/ProjectStreaming/"
        working-directory: frontend 

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Apuntamos a la carpeta de salida dentro de frontend
          publish_dir: ./frontend/build/web