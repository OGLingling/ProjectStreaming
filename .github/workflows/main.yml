name: Deploy Flutter Web
on:
  push:
    branches:
      - main # O master, según tu rama

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build Web
        # REEMPLAZA 'tu-carpeta' con el nombre real (ej. frontend)
        run: flutter build web --base-href "/ProjectStreaming/"
        working-directory: frontend 

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # REEMPLAZA 'tu-carpeta' aquí también
          publish_dir: ./frontend/build/web
